services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - WEBUI_PORT=8080
    volumes:
      - ${STORAGE_PATH}/docker/arr/qbittorrent/config:/config
      - ${STORAGE_PATH}/media/downloads:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/prowlarr/config:/config
      - ${STORAGE_PATH}/media:/media
    ports:
      - 9696:9696
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/sonarr/config:/config
      - ${STORAGE_PATH}/media:/media
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/radarr/config:/config
      - ${STORAGE_PATH}/media:/media
    ports:
      - 7878:7878
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/lidarr/config:/config
      - ${STORAGE_PATH}/media:/media
    ports:
      - 8686:8686
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/bazarr/config:/config
      - ${STORAGE_PATH}/media:/media
    ports:
      - 6767:6767
    restart: unless-stopped

  seerr:
    image: seerr/seerr:latest
    container_name: seerr
    environment:
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/seerr/config:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/tautulli/config:/config
    ports:
      - 8181:8181
    restart: unless-stopped

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    user: "1000:1000"
    environment:
      - TZ=Europe/Rome
    volumes:
      - ${STORAGE_PATH}/docker/arr/maintainerr/config:/opt/data
    ports:
      - 6246:6246
    restart: unless-stopped
